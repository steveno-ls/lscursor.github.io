# Build Vite output and deploy to GitHub Pages.
# In repo Settings → Pages: set Source to "GitHub Actions" (not "Deploy from branch").
# For @lightspeed packages on npm.pkg.github.com, add repo secret GH_PACKAGES_TOKEN:
#   GitHub → your avatar → Settings → Developer settings → Personal access tokens
#   → Generate new token (classic) → enable scope "read:packages" → create, copy value
#   → Repo Settings → Secrets and variables → Actions → New repository secret
#   → Name: GH_PACKAGES_TOKEN, Secret: paste the token
# Use an account that is allowed to install @lightspeed/* from GitHub Packages (often your work GitHub user).

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Authenticate npm for GitHub Packages (@lightspeed)
        run: echo "//npm.pkg.github.com/:_authToken=${{ secrets.GH_PACKAGES_TOKEN }}" >> .npmrc

      - run: npm ci
      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
