# Build Vite output and deploy to GitHub Pages.
# In repo Settings → Pages: set Source to "GitHub Actions" (not "Deploy from branch").
# For @lightspeed packages on npm.pkg.github.com, add repo secret GH_PACKAGES_TOKEN:
#   GitHub → your avatar → Settings → Developer settings → Personal access tokens
#   → Generate new token (classic) → enable scope "read:packages" → create, copy value
#   → Repo Settings → Secrets and variables → Actions → New repository secret
#   → Name: GH_PACKAGES_TOKEN, Secret: paste the token
# Use an account that is allowed to install @lightspeed/* from GitHub Packages (often your work GitHub user).
#
# IMPORTANT: Put GH_PACKAGES_TOKEN under "Repository secrets" (same page as Actions secrets),
# not only under an Environment (e.g. github-pages). The *build* job does not use `environment:`,
# so environment-only secrets are invisible there and `npm ci` will fail with 401.
# If npm ci still returns 401 after auth is configured, confirm the PAT user can install @lightspeed/* (org package access).

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Ensure GH_PACKAGES_TOKEN is available to this job
        env:
          NPM_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          if [ -z "${NPM_TOKEN}" ]; then
            echo "::error::GH_PACKAGES_TOKEN is missing or empty for the build job."
            echo "Fix: Repo → Settings → Secrets and variables → Actions → Repository secrets → add GH_PACKAGES_TOKEN."
            echo "If you only added it under Environments → github-pages, duplicate it as a repository secret (or the build step cannot read it)."
            exit 1
          fi

      - name: Write .npmrc for GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          # Replace the committed .npmrc: npm must see registry + token + always-auth together
          # or tarball GETs return 401. Trailing slash matches GitHub Packages docs.
          {
            printf '%s\n' '@lightspeed:registry=https://npm.pkg.github.com/'
            printf '%s\n' "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}"
            printf '%s\n' 'always-auth=true'
          } > .npmrc

      - name: Sanity-check .npmrc (token redacted)
        run: sed 's/\(_authToken=\).*/\1***redacted***/' .npmrc

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: npm ci

      - name: Production build
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
